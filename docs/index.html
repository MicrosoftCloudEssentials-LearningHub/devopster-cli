<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>devopster-cli</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --fg: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: #334155;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 15%, #1e293b, var(--bg));
      color: var(--fg);
      line-height: 1.6;
    }
    main {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card {
      background: color-mix(in srgb, var(--panel) 90%, #000 10%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2.2rem;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
    }
    .badge-link img {
      height: 24px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>devopster-cli</h1>
      <p>Container-first Rust CLI for repository governance across GitHub, Azure DevOps, and GitLab.</p>
      <p>
        Repository: <a href="https://github.com/Cloud2BR/devopster-cli">github.com/Cloud2BR/devopster-cli</a>
      </p>
      <!-- START BADGE -->
          <span class="badge-link"><img src="https://img.shields.io/badge/Total%20views-20-limegreen" alt="Total views" loading="lazy" /></span>
          <!-- END BADGE -->
    </section>
  </main>
</body>
</html>
