name: Build Release Artifacts

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf dist/devopster-linux-x86_64.tar.gz -C target/release devopster

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/devopster.exe -DestinationPath dist/devopster-windows-x86_64.zip -Force

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/devopster-cli
          cp target/release/devopster dist/devopster-cli/
          tar -czf dist/devopster-macos-x86_64.tar.gz -C target/release devopster
          hdiutil create -volname devopster-cli -srcfolder dist/devopster-cli -ov -format UDZO dist/devopster-macos.dmg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devopster-${{ runner.os }}
          path: dist/*

  release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
