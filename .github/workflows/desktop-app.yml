name: Desktop App (Tauri)

# Builds the DevOpster desktop app for macOS (Intel + Apple Silicon),
# Windows x64, and Linux x64. Runs on manual dispatch and on `desktop-v*`
# tags. Kept independent from release-artifacts.yml so a Tauri failure
# never blocks CLI releases.

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release from this manual run
        required: false
        type: boolean
        default: false
      release_tag:
        description: Release tag to create/use when publishing manually (for example desktop-v0.1.0-debug1)
        required: false
        type: string
        default: "desktop-v0.1.0-debug1"
      build_macos_x64:
        description: Build Intel macOS artifact (macos-13, may queue longer)
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: tauri-${{ matrix.label }}-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Build devopster CLI for target
        run: cargo build --release --target ${{ matrix.target }} --bin devopster

      - name: Stage sidecar binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/devopster.exe" "src-tauri/binaries/devopster-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/devopster" "src-tauri/binaries/devopster-${{ matrix.target }}"
            chmod +x "src-tauri/binaries/devopster-${{ matrix.target }}"
          fi
          ls -la src-tauri/binaries

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Generate platform icons
        run: cargo tauri icon assets/devopster-icon.png

      - name: Build Tauri bundle
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Ad-hoc codesign macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Apple Silicon and modern Intel macOS refuse to launch unsigned
          # apps with the cryptic "DevOpster.app is damaged" alert. An ad-hoc
          # signature (sign identity "-") satisfies the loader so the app
          # runs without users having to run `xattr -cr DevOpster.app`.
          BUNDLE_ROOT="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_ROOT/macos" ]; then
            for app in "$BUNDLE_ROOT/macos"/*.app; do
              [ -d "$app" ] || continue
              echo "codesign $app"
              codesign --force --deep --options runtime --sign - "$app"
              codesign --verify --deep --strict --verbose=2 "$app" || true
            done
          fi
          if [ -d "$BUNDLE_ROOT/dmg" ]; then
            for dmg in "$BUNDLE_ROOT/dmg"/*.dmg; do
              [ -f "$dmg" ] || continue
              echo "codesign $dmg"
              codesign --force --sign - "$dmg" || true
            done
          fi

      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p dist
          BUNDLE_ROOT="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_ROOT" ]; then
            find "$BUNDLE_ROOT" -type f \
              \( -name "*.dmg" -o -name "*.app.tar.gz" \
                 -o -name "*.msi" -o -name "*-setup.exe" \
                 -o -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \) \
              -exec cp {} dist/ \; || true
          fi
          ls -la dist || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devopster-desktop-${{ matrix.label }}
          path: dist/*
          if-no-files-found: warn

  build_macos_x64:
    if: startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'workflow_dispatch' && inputs.build_macos_x64 == true)
    name: macos-x64
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: tauri-macos-x64-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Build devopster CLI for target
        run: cargo build --release --target x86_64-apple-darwin --bin devopster

      - name: Stage sidecar binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "target/x86_64-apple-darwin/release/devopster" "src-tauri/binaries/devopster-x86_64-apple-darwin"
          chmod +x "src-tauri/binaries/devopster-x86_64-apple-darwin"
          ls -la src-tauri/binaries

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Generate platform icons
        run: cargo tauri icon assets/devopster-icon.png

      - name: Build Tauri bundle
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Ad-hoc codesign macOS bundle
        shell: bash
        run: |
          BUNDLE_ROOT="src-tauri/target/x86_64-apple-darwin/release/bundle"
          if [ -d "$BUNDLE_ROOT/macos" ]; then
            for app in "$BUNDLE_ROOT/macos"/*.app; do
              [ -d "$app" ] || continue
              codesign --force --deep --options runtime --sign - "$app"
              codesign --verify --deep --strict --verbose=2 "$app" || true
            done
          fi
          if [ -d "$BUNDLE_ROOT/dmg" ]; then
            for dmg in "$BUNDLE_ROOT/dmg"/*.dmg; do
              [ -f "$dmg" ] || continue
              codesign --force --sign - "$dmg" || true
            done
          fi

      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p dist
          BUNDLE_ROOT="src-tauri/target/x86_64-apple-darwin/release/bundle"
          if [ -d "$BUNDLE_ROOT" ]; then
            find "$BUNDLE_ROOT" -type f \
              \( -name "*.dmg" -o -name "*.app.tar.gz" \) \
              -exec cp {} dist/ \; || true
          fi
          ls -la dist || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devopster-desktop-macos-x64
          path: dist/*
          if-no-files-found: warn

  publish:
    if: startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    needs: [build, build_macos_x64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f -exec cp {} flat/ \;
          ls -la flat

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: flat/*
          generate_release_notes: true
          name: DevOpster Desktop ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
