<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevOpster</title>
    <link rel="icon" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <img src="logo.png" alt="" />
          <div>
            <div class="brand-name">DevOpster</div>
            <div class="brand-tag">Desktop</div>
          </div>
        </div>

        <nav id="nav">
          <button class="nav" data-route="dashboard"><span>🏠</span> Dashboard</button>
          <button class="nav" data-route="diagnostics"><span>🩺</span> Diagnostics</button>
          <button class="nav" data-route="inventory"><span>📦</span> Inventory</button>
          <button class="nav" data-route="audit"><span>🛡️</span> Repo audit</button>
          <button class="nav" data-route="stats"><span>📊</span> Stats</button>
          <button class="nav" data-route="catalog"><span>📚</span> Catalog</button>
          <button class="nav" data-route="topics"><span>🏷️</span> Topics</button>
          <button class="nav" data-route="setup"><span>⚙️</span> Setup</button>
          <button class="nav" data-route="config"><span>📝</span> Config</button>
          <button class="nav" data-route="console"><span>🖥️</span> CLI Mode</button>
        </nav>

        <div class="sidebar-foot">
          <div id="env-os">os: …</div>
          <div id="env-sidecar">sidecar: …</div>
          <a href="https://cloud2br.github.io/devopster-cli/" target="_blank" rel="noopener noreferrer">Project site ↗</a>
        </div>
      </aside>

      <main id="main">
        <header class="topbar">
          <div>
            <div class="title" id="route-title">Dashboard</div>
            <div class="subtitle" id="route-sub">Overview of your DevOpster environment.</div>
          </div>
          <div class="topbar-actions" id="topbar-actions"></div>
        </header>
        <section id="view"></section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <div id="cli-drawer" class="cli-drawer" aria-hidden="true">
      <div class="cli-drawer-header">
        <div class="cli-drawer-title">CLI Mode</div>
        <div class="cli-drawer-actions">
          <button id="cli-clear" class="btn" type="button">Clear</button>
          <button id="cli-close" class="btn" type="button">Close</button>
        </div>
      </div>
      <div class="cli-drawer-toolbar">
        <input id="cli-input" class="input" type="text" placeholder="e.g. repo audit --report-only" autocomplete="off" />
        <button id="cli-run" class="btn btn-primary" type="button">Run</button>
      </div>
      <pre id="cli-output" class="console cli-console">Ready.
</pre>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
